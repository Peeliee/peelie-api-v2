<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Admin</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --line: #d9dce7;
            --text: #1b2130;
            --sub: #5f687c;
            --accent: #1f6feb;
            --danger: #c73737;
        }
        body {
            margin: 0;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            background: linear-gradient(145deg, #f7f8fc 0%, #eef2ff 100%);
            color: var(--text);
        }
        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 32px 20px 80px;
        }
        .head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }
        .head h1 {
            margin: 0;
            font-size: 28px;
        }
        .sub {
            color: var(--sub);
            font-size: 14px;
            margin-top: 4px;
        }
        .message {
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--accent);
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(20, 32, 70, 0.05);
        }
        .question-title {
            font-weight: 700;
            margin-bottom: 10px;
        }
        .line {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .line + .line {
            margin-top: 8px;
        }
        input {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            min-width: 120px;
        }
        input[type="text"] {
            flex: 1 1 420px;
        }
        .display-order {
            width: 80px;
        }
        select {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            background: #fff;
        }
        button {
            border: 0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            background: #e5e9f4;
            color: #24314f;
        }
        .primary {
            background: var(--accent);
            color: #fff;
        }
        .danger {
            background: #fee3e3;
            color: var(--danger);
        }
        .content-input {
            flex: 1 1 520px;
        }
        .purpose-input {
            flex: 1 1 720px;
        }
        .purpose-quick {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        .purpose-quick button {
            white-space: nowrap;
            border: 1px solid #b8c0d8;
            background: #f7f9ff;
            color: #314066;
        }
        .section-head {
            margin: 18px 2px 10px;
        }
        .section-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .section-sub {
            margin-top: 4px;
            color: var(--sub);
            font-size: 13px;
        }
        .section-divider {
            margin-top: 10px;
            border-top: 1px solid var(--line);
        }
        .badge {
            display: inline-block;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            color: #fff;
        }
        .badge.choice {
            background: #2f6fed;
        }
        .badge.subjective {
            background: #0b8b5f;
        }
        .hint {
            margin-top: 10px;
            color: var(--sub);
            font-size: 13px;
        }
        .options {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--line);
        }
        .options h4 {
            margin: 0 0 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="head">
        <div>
            <h1>온보딩 질문 관리</h1>
            <div class="sub">질문 등록, 수정, 삭제를 지원합니다. 주관식으로 바꾸면 선택지는 함께 삭제됩니다.</div>
        </div>
    </div>

    <div class="message" th:if="${message != null}" th:text="'처리 완료: ' + ${message}"></div>

    <div class="card">
        <div class="question-title">질문 추가</div>
        <form method="post" th:action="@{/admin/onboarding/questions}" th:object="${questionForm}">
            <div class="line">
                <input class="content-input" type="text" th:field="*{content}" placeholder="질문 내용" required>
                <input class="display-order" type="number" th:field="*{displayOrder}" min="0" placeholder="질문 순서" required>
                <select th:field="*{questionType}" required>
                    <option th:each="type : ${questionTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
                <button class="primary" type="submit">질문 생성</button>
            </div>
            <div class="line">
                <input class="purpose-input" type="text" th:field="*{purpose}" placeholder="질문 목적 (아래에서 선택 혹은 직접 입력)" required>
            </div>
            <div class="line purpose-quick">
                <button type="button" data-purpose-fill="PERSONALITY_CONVERSATION_STYLE">PERSONALITY_CONVERSATION_STYLE</button>
                <button type="button" data-purpose-fill="USER_INTERESTS">USER_INTERESTS</button>
                <button type="button" data-purpose-fill="USER_INFO">USER_INFO</button>
            </div>

            <div class="options">
                <h4>선택지</h4>
                <div class="hint">객관식 질문일 때만 입력하세요. 비어 있는 선택지 줄은 저장하지 않습니다.</div>
                <div class="line" th:each="idx : ${#numbers.sequence(0, 3)}">
                    <input type="text" th:name="|answerOptions[${idx}].content|" placeholder="선택지 내용">
                    <input class="display-order" type="number" th:name="|answerOptions[${idx}].displayOrder|" min="1" placeholder="순서">
                    <input type="text" th:name="|answerOptions[${idx}].optionTag|" placeholder="선택지 태그">
                </div>
            </div>
        </form>
    </div>

    <div class="section-head">
        <h2 class="section-title">현재 질문 목록</h2>
        <div class="section-sub">생성된 질문을 수정하거나 삭제합니다.</div>
        <div class="section-divider"></div>
    </div>

    <div class="card" th:if="${#lists.isEmpty(questions)}">
        <div class="hint">등록된 질문이 없습니다.</div>
    </div>

    <div class="card" th:each="question : ${questions}">
        <form method="post" th:action="@{|/admin/onboarding/questions/${question.id}|}">
            <div class="line">
                <input class="content-input" type="text" name="content" th:value="${question.content}" placeholder="질문 내용" required>
                <input class="display-order" type="number" name="displayOrder" th:value="${question.displayOrder}" min="0" placeholder="질문 순서" required>
                <select name="questionType" required>
                    <option th:each="type : ${questionTypes}"
                            th:value="${type}"
                            th:text="${type}"
                            th:selected="${type == question.questionType}"></option>
                </select>
                <button class="primary" type="submit">질문 수정</button>
            </div>
            <div class="line">
                <input class="purpose-input" type="text" name="purpose" th:value="${question.purpose}" placeholder="질문 목적" required>
            </div>
            <div class="line purpose-quick">
                <button type="button" data-purpose-fill="PERSONALITY_CONVERSATION_STYLE">PERSONALITY_CONVERSATION_STYLE</button>
                <button type="button" data-purpose-fill="USER_INTERESTS">USER_INTERESTS</button>
                <button type="button" data-purpose-fill="USER_INFO">USER_INFO</button>
            </div>
        </form>

        <div class="hint" th:if="${question.subjective}">주관식 질문입니다. 선택지가 없습니다.</div>
        <div class="options" th:if="${!question.subjective}">
            <h4>선택지</h4>
            <div class="hint">질문을 주관식으로 바꾸면 아래 선택지는 모두 삭제됩니다.</div>
            <div class="hint" th:if="${#lists.isEmpty(question.answerOptions)}">등록된 선택지가 없습니다.</div>
            <div class="line" th:each="option : ${question.answerOptions}">
                <span th:text="|${option.displayOrder}. ${option.content}|">선택지</span>
                <span class="hint" th:text="${option.optionTag}">태그</span>
            </div>
        </div>

        <form method="post" th:action="@{|/admin/onboarding/questions/${question.id}/delete|}" style="margin-top:12px;">
            <button class="danger" type="submit">질문 삭제</button>
        </form>
    </div>
</div>
<script>
    document.querySelectorAll(".purpose-quick").forEach((quickRow) => {
        const form = quickRow.closest("form");
        if (!form) return;
        const input = form.querySelector('input[name="purpose"]');
        if (!input) return;
        quickRow.querySelectorAll("button[data-purpose-fill]").forEach((button) => {
            button.addEventListener("click", () => {
                input.value = button.getAttribute("data-purpose-fill");
                input.focus();
            });
        });
    });
</script>
</body>
</html>
